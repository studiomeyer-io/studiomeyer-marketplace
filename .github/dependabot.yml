version: 2
# Conservative policy (S992) — only github-actions tracked here.
# This repo doesn't have a top-level npm/pip/cargo manifest.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
